<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movara - Visão Geral</title>

    <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

    <aside class="sidebar">

        <h2>Movara</h2>

        <nav>
            <a href="dashboard.html" class="active">Visão Geral</a>
            <a href="veiculos.html">Veículos</a>
            <a href="entrada-saida.html">Entrada/Saída</a>
            <a href="relatorios.html">Relatórios</a>
            <a href="usuarios.html">Usuários</a>
            <a href="../Index.html">Sair</a>
        </nav>

    </aside>

    <main class="content">

        <header>
            <h1>Visão Geral</h1>
            <p>Painel inicial do sistema</p>
        </header>

        
        <div class="config-preco">

            <h3>Configurar preço por hora</h3>

            <input
                type="number"
                id="precoInput"
                placeholder="Ex: 10"
                step="0.01">

            <button onclick="salvarPreco()">
                Salvar preço
            </button>

        </div>

        
        <div id="toast-container"></div>

        
        <section class="cards">

            <div class="card">
                <h3>Veículos</h3>
                <span id="totalVeiculos">0</span>
            </div>

            <div class="card">
                <h3>Entradas Hoje</h3>
                <span id="totalEntradas">0</span>
            </div>

            <div class="card">
                <h3>Saídas Hoje</h3>
                <span id="totalSaidas">0</span>
            </div>

            <div class="card">
                <h3>Estacionados</h3>
                <span id="totalEstacionados">0</span>
            </div>

            <div class="card">
            <h3>Vagas Disponíveis</h3>
            <span id="totalVagas">0</span>
            </div>

        </section>

        
        <h2 style="margin-top:30px;">Veículos Estacionados Agora</h2>

        <div id="ativos"></div>

    </main>

    <script src="../js/dashboard.js"></script>

</body>

</html>
